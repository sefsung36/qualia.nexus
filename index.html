<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QUALIA</title>

  <style>
    :root {
      --bg: #121212;
      --mark-size: clamp(132px, 12.75vw, 220px);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
    }

    body {
      background: var(--bg);
      overflow: hidden;
    }

    .landing {
      width: 100%;
      height: 100svh;
      display: grid;
      place-items: center;
    }

    .mark {
      width: var(--mark-size);
      height: auto;
      display: block;
      opacity: 1;
      transform: none;
    }
  </style>
  
  <link rel="icon" href="./favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png">
<link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
<link rel="manifest" href="./site.webmanifest">
<meta name="theme-color" content="#121212">
  
</head>

<body>
  <main class="landing">
    <img class="mark" src="./assets/logocircle.svg" alt="QUALIA" />
  </main>
</body>
</html>
